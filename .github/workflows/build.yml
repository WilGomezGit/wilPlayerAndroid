name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

# Evita el warning de deprecación de Node.js 20 en todos los actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # ubuntu-latest ya trae el Android SDK instalado en $ANDROID_SDK_ROOT
      # No es necesario android-actions/setup-android

      - name: Setup Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY || 'placeholder_key' }}" >> local.properties

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon -PYOUTUBE_API_KEY="${{ secrets.YOUTUBE_API_KEY || 'placeholder_key' }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WilPlayer-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: WilPlayer v${{ github.run_number }}
          body: |
            ## WilPlayer Android APK
            Build automatico generado por GitHub Actions.
            - Commit: ${{ github.sha }}
          files: app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
